<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOC Mapping Manager • CyberOps</title>
<style>
:root{
  --bg1:#0b1020;--bg2:#0e1630;--border:rgba(255,255,255,0.14);
  --text:rgba(255,255,255,0.92);--muted:rgba(255,255,255,0.55);
  --shadow:0 10px 30px rgba(0,0,0,0.35);
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --blue:#3b82f6;--purple:#a855f7;--orange:#f97316;
  --sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(1200px 600px at 10% 10%,#1a2b6b 0%,transparent 55%),radial-gradient(900px 500px at 90% 20%,#5b2b82 0%,transparent 55%),linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Top bar ── */
.topbar{height:52px;background:rgba(0,0,0,0.35);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;backdrop-filter:blur(8px);z-index:50}
.topbar-logo{font-size:15px;font-weight:700;letter-spacing:0.2px;white-space:nowrap}
.topbar-logo span{color:var(--blue)}
.topbar-sep{width:1px;height:20px;background:var(--border)}
.topbar-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s}
.status-dot.ok{background:var(--green)}
.status-dot.err{background:var(--red)}
.status-dot.loading{background:var(--yellow);animation:pulse 1s infinite}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.07);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.topbar-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.24)}
.topbar-btn.primary{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.45);color:#93c5fd}
.topbar-btn.success{background:rgba(34,197,94,0.18);border-color:rgba(34,197,94,0.4);color:#86efac}
.topbar-btn.danger-outline{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#fca5a5}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar);flex-shrink:0;background:rgba(0,0,0,0.25);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;backdrop-filter:blur(6px)}
.sidebar-section{padding:14px 10px 6px;font-size:10px;text-transform:uppercase;letter-spacing:0.9px;color:rgba(255,255,255,0.35);font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:9px;margin:1px 6px;cursor:pointer;font-size:13px;color:var(--muted);transition:all 0.12s;border:1px solid transparent;white-space:nowrap}
.nav-item:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,0.15);border-color:rgba(59,130,246,0.3);color:#93c5fd}
.nav-item .icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:rgba(239,68,68,0.25);border:1px solid rgba(239,68,68,0.4);color:#fca5a5;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px}
.nav-badge.ok{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#86efac}
.sidebar-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--border)}

/* ── Main content ── */
.main{flex:1;overflow-y:auto;padding:22px 24px}

/* ── Page header ── */
.page-header{margin-bottom:20px}
.page-title{font-size:22px;font-weight:700;line-height:1.2}
.page-subtitle{font-size:13px;color:var(--muted);margin-top:5px}

/* ── Cards ── */
.card{background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.05));border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(6px);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-body{padding:18px}

/* ── Stat grid ── */
.stat-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));margin-bottom:18px}
.stat{background:linear-gradient(180deg,rgba(255,255,255,0.08),rgba(255,255,255,0.04));border:1px solid var(--border);border-radius:14px;padding:14px;backdrop-filter:blur(6px)}
.stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.stat .val{font-size:28px;font-weight:700;line-height:1}
.stat .sub{font-size:11px;color:var(--muted);margin-top:4px}
.blue .val{color:var(--blue)}.green .val{color:var(--green)}
.yellow .val{color:var(--yellow)}.red .val{color:var(--red)}
.purple .val{color:var(--purple)}.orange .val{color:var(--orange)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--muted);border-bottom:1px solid var(--border);background:rgba(0,0,0,0.15);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.04)}
td{padding:9px 12px;vertical-align:middle}
.mono{font-family:ui-monospace,monospace;font-size:11px}
.pill{display:inline-block;font-family:ui-monospace,monospace;font-size:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);padding:2px 7px;border-radius:999px;margin:1px 2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.badge-dot{width:5px;height:5px;border-radius:50%}
.b-green{background:rgba(34,197,94,0.15);color:var(--green)}.b-green .badge-dot{background:var(--green)}
.b-yellow{background:rgba(234,179,8,0.15);color:var(--yellow)}.b-yellow .badge-dot{background:var(--yellow)}
.b-red{background:rgba(239,68,68,0.15);color:var(--red)}.b-red .badge-dot{background:var(--red)}
.b-blue{background:rgba(59,130,246,0.15);color:var(--blue)}.b-blue .badge-dot{background:var(--blue)}
.b-gray{background:rgba(255,255,255,0.07);color:var(--muted)}.b-gray .badge-dot{background:var(--muted)}

/* ── Search / filter ── */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-input{background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;padding:7px 12px;outline:none;width:210px;transition:border-color 0.2s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.10)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.07);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,0.12);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.primary{background:rgba(59,130,246,0.18);border-color:rgba(59,130,246,0.4);color:#93c5fd}
.btn.success{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.35);color:#86efac}
.btn.danger{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.3);color:#fca5a5}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn.secondary{color:var(--muted);font-weight:500}

/* ── Form controls ── */
.field-group{margin-bottom:14px}
.field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tag-auto{font-size:10px;color:var(--green);background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);padding:1px 6px;border-radius:999px}
.tag-manual{font-size:10px;color:var(--orange);background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.25);padding:1px 6px;border-radius:999px}
.tag-req{color:var(--orange);font-size:10px}
.field-input,.field-select{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;padding:8px 12px;outline:none;transition:border-color 0.2s}
.field-input:focus,.field-select:focus{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.10)}
.field-select option{background:#1e2a45}
.field-input::placeholder{color:var(--muted)}
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{position:relative;width:38px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,0.12);border-radius:20px;transition:0.2s}
.toggle-slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;top:3px;background:rgba(255,255,255,0.5);border-radius:50%;transition:0.2s}
.toggle input:checked + .toggle-slider{background:rgba(59,130,246,0.45)}
.toggle input:checked + .toggle-slider:before{transform:translateX(18px);background:#93c5fd}
.toggle-lbl{font-size:12px;color:var(--muted)}

/* ── Chip multi-select ── */
.chips-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;min-height:26px}
.chip{display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,0.18);border:1px solid rgba(59,130,246,0.35);color:#93c5fd;font-size:11px;padding:2px 8px;border-radius:999px;cursor:pointer;font-family:ui-monospace,monospace}
.chip:hover{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.4);color:#fca5a5}

/* ── Drawer / modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.drawer{background:linear-gradient(180deg,#0f1a38,#0b1428);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:26px;width:100%;max-width:680px;animation:fadeIn 0.18s ease;box-shadow:0 24px 60px rgba(0,0,0,0.6)}
.drawer-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px}
.drawer-title{font-size:17px;font-weight:700}
.drawer-subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.close-btn{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.close-btn:hover{background:rgba(255,255,255,0.14);color:var(--text)}
.drawer-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}
.section-divider{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 10px;padding-left:8px;border-left:2px solid rgba(59,130,246,0.5)}

/* ── Alert / gap banner ── */
.gap-banner{background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.3);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.gap-banner .icon{font-size:18px;flex-shrink:0}
.gap-banner .text{flex:1;font-size:13px;line-height:1.5}
.gap-banner .text strong{color:var(--yellow)}

/* ── Toast ── */
#toast-container{position:fixed;bottom:22px;right:22px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:linear-gradient(135deg,rgba(15,26,56,0.97),rgba(11,20,40,0.97));border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;min-width:260px;max-width:380px;box-shadow:0 8px 24px rgba(0,0,0,0.5);animation:slideUp 0.2s ease;pointer-events:all;display:flex;align-items:center;gap:10px}
.toast.success{border-color:rgba(34,197,94,0.4);color:#86efac}
.toast.error{border-color:rgba(239,68,68,0.4);color:#fca5a5}
.toast.info{border-color:rgba(59,130,246,0.4);color:#93c5fd}
.toast.warning{border-color:rgba(234,179,8,0.4);color:#fde68a}

/* ── Loading ── */
.loading-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:10;border-radius:16px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite}

/* ── Empty state ── */
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty .icon{font-size:36px;margin-bottom:10px;opacity:0.5}
.empty .msg{font-size:13px}

/* ── Tabs (inside cards) ── */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab-pill{padding:6px 14px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.12s}
.tab-pill:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.tab-pill.active{background:rgba(59,130,246,0.18);border-color:rgba(59,130,246,0.35);color:#93c5fd}
.tab-content{display:none}.tab-content.active{display:block}

/* ── Validation result ── */
.val-list{font-size:12px;font-family:ui-monospace,monospace;line-height:1.8}
.val-error{color:#fca5a5}.val-warn{color:#fde68a}.val-ok{color:#86efac}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="topbar">
  <div class="topbar-logo">🛡 SOC <span>Manager</span></div>
  <div class="topbar-sep"></div>
  <div class="topbar-status">
    <div class="status-dot loading" id="nb-dot"></div>
    <span id="nb-status">Connecting…</span>
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-status" id="mapping-status-bar" style="display:none">
    <div class="status-dot" id="mapping-dot"></div>
    <span id="mapping-status-text">mapping.yaml</span>
  </div>
  <div class="topbar-right">
    <button class="topbar-btn" onclick="App.reload()">↺ Refresh</button>
    <button class="topbar-btn primary" onclick="App.validateAll()">✓ Validate</button>
    <button class="topbar-btn success" onclick="App.downloadForm()">⬇ Export Form</button>
  </div>
</div>

<!-- ── Layout ── -->
<div class="layout">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-section">Overview</div>
    <div class="nav-item active" data-page="dashboard" onclick="App.nav(this)">
      <span class="icon">📊</span> Dashboard
    </div>

    <div class="sidebar-section">Mapping</div>
    <div class="nav-item" data-page="server-roles" onclick="App.nav(this)">
      <span class="icon">🖥</span> Server Roles
      <span class="nav-badge" id="nb-srv-count">—</span>
    </div>
    <div class="nav-item" data-page="workstation-roles" onclick="App.nav(this)">
      <span class="icon">💻</span> Workstations
      <span class="nav-badge ok" id="nb-wrk-count">—</span>
    </div>
    <div class="nav-item" data-page="appliance-roles" onclick="App.nav(this)">
      <span class="icon">🔌</span> Appliances
      <span class="nav-badge ok" id="nb-apl-count">—</span>
    </div>
    <div class="nav-item" data-page="products" onclick="App.nav(this)">
      <span class="icon">📦</span> Products
      <span class="nav-badge ok" id="nb-prod-count">—</span>
    </div>
    <div class="nav-item" data-page="os-benchmarks" onclick="App.nav(this)">
      <span class="icon">🐧</span> OS Benchmarks
      <span class="nav-badge ok" id="nb-os-count">—</span>
    </div>

    <div class="sidebar-section">NetBox</div>
    <div class="nav-item" data-page="choicesets" onclick="App.nav(this)">
      <span class="icon">🗂</span> Choice Sets
    </div>
    <div class="nav-item" data-page="gaps" onclick="App.nav(this)">
      <span class="icon">⚠</span> Gaps
      <span class="nav-badge" id="nb-gap-count">—</span>
    </div>

    <div class="sidebar-section">Export</div>
    <div class="nav-item" data-page="form-preview" onclick="App.nav(this)">
      <span class="icon">📋</span> Onboarding Form
    </div>
    <div class="nav-item" data-page="yaml-export" onclick="App.nav(this)">
      <span class="icon">📄</span> Export YAML
    </div>

    <div class="sidebar-bottom">
      <div style="font-size:10px;color:rgba(255,255,255,0.3);padding:4px 8px" id="sidebar-meta"></div>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main class="main" id="main-content">
    <div class="empty"><div class="icon">⏳</div><div class="msg">Loading…</div></div>
  </main>

</div>

<!-- ── Edit Drawer ── -->
<div class="overlay" id="drawer-overlay" onclick="Drawer.onBg(event)">
  <div class="drawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-title" id="drawer-title">Edit</div>
        <div class="drawer-subtitle" id="drawer-subtitle"></div>
      </div>
      <button class="close-btn" onclick="Drawer.close()">✕</button>
    </div>
    <div id="drawer-body"></div>
    <div class="drawer-actions">
      <button class="btn secondary" onclick="Drawer.close()">Cancel</button>
      <button class="btn danger sm" id="drawer-delete" onclick="Drawer.delete()" style="display:none">🗑 Delete</button>
      <button class="btn success" onclick="Drawer.save()">✓ Save</button>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
